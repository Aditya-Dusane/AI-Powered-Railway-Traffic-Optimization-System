# Nixpacks — tells Railway/Render to install Node 22 + Python 3.12
# Both runtimes are needed: Node runs Express, Python runs AI agents

[phases.setup]
nixPkgs = ["nodejs_22", "python312"]

[phases.install]
cmds = [
  "npm install",
  "npm install --prefix server",
  "pip install -r python/requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server/server.js"
