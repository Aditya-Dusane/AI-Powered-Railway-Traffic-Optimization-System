# Nixpacks config — Railway build system
# Installs Node.js 22 + Python 3.12 so Express can spawn Python agents at runtime.

[phases.setup]
nixPkgs = ["nodejs_22", "python312"]

[phases.install]
# --include=dev ensures vite/@vitejs/plugin-react are installed even if NODE_ENV=production
cmds = [
  "npm install --include=dev",
  "npm install --prefix server",
  "pip install -r python/requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server/server.js"
