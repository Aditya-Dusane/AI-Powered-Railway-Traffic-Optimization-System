[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm install --prefix server && pip install -r python/requirements.txt && npm run build"

[deploy]
startCommand = "node server/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
