services:
  - type: web
    name: railsync-ai
    runtime: node
    region: oregon
    plan: free

    # Build: runs build.sh which installs all deps then builds Vite frontend
    # NOTE: We cd into frontend/ so that vite resolves from frontend/node_modules/.bin/
    buildCommand: "bash build.sh"

    # Start: Node server (serves API + built frontend/dist in production)
    startCommand: node server/server.js

    # Health check
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GROQ_API_KEY
        sync: false   # You will paste the actual value in Render dashboard
