services:
  - type: web
    name: railsync-ai
    runtime: node
    region: oregon
    plan: free

    # Single npm install covers all workspaces (root + frontend + server).
    # vite is hoisted to root node_modules/.bin/ — no PATH issues.
    buildCommand: "npm install && pip install -r python/requirements.txt && npm run build"

    # Start: Express serves API + built frontend/dist in production
    startCommand: node server/server.js

    # Health check
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GROQ_API_KEY
        sync: false
