services:
  - type: web
    name: railsync-ai
    runtime: node
    region: oregon
    plan: free

    # KEY: npm install --include=dev forces devDependencies (vite, @vitejs/plugin-react)
    # to be installed even when NODE_ENV=production is set in envVars below.
    # Without --include=dev, npm skips devDeps in production mode → "vite: not found".
    buildCommand: "npm install --include=dev && npm install --prefix server && pip install -r python/requirements.txt && npm run build"

    # Express serves the built frontend/dist + all /api/* routes
    startCommand: node server/server.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GROQ_API_KEY
        sync: false   # Paste actual value in Render dashboard → Environment tab
