services:
  - type: web
    name: railsync-ai
    runtime: node
    region: oregon
    plan: free

    # Build: install all deps, install Python deps, build the Vite frontend
    # NOTE: We cd into frontend/ so that vite resolves from frontend/node_modules/.bin/
    buildCommand: "npm install && npm install --prefix server && pip install -r python/requirements.txt && cd frontend && npm install && npm run build"

    # Start: Node server (serves API + built frontend/dist in production)
    startCommand: node server/server.js

    # Health check
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GROQ_API_KEY
        sync: false   # You will paste the actual value in Render dashboard
