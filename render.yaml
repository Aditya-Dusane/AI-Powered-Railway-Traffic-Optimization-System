services:
  - type: web
    name: railsync-ai
    runtime: node
    region: oregon
    plan: free

    # Step 1: Install root deps (includes vite — in dependencies, NOT devDependencies)
    # Step 2: Install server-specific deps (express, cors)
    # Step 3: Install Python deps (groq SDK)
    # Step 4: Build Vite frontend → outputs to frontend/dist/
    buildCommand: "npm install && npm install --prefix server && pip install -r python/requirements.txt && npm run build"

    # Express serves /api/* routes + frontend/dist/ static files in production
    startCommand: "node server/server.js"

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GROQ_API_KEY
        sync: false
